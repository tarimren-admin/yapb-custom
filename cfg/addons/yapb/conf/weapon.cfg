; 
; 配置文件功能：用于定义机器人的武器偏好设置
;

; 武器编号:
; 0 - KNIFE
; 1 - USP
; 2 - GLOCK18
; 3 - DEAGLE
; 4 - P228
; 5 - ELITE
; 6 - FIVESEVEN
; 7 - M3
; 8 - XM1014
; 9 - MP5NAVY
; 10 - TMP
; 11 - P90
; 12 - MAC10
; 13 - UMP45
; 14 - AK47
; 15 - SG552
; 16 - M4A1
; 17 - GALIL
; 18 - FAMAS
; 19 - AUG
; 20 - SCOUT
; 21 - AWP
; 22 - G3SG1
; 23 - SG550
; 24 - M249
; 25 - SHIELD

;
; 以下设置指定哪个队伍在某个地图上可以购买武器
; 也可以用于允许/禁止某个队伍或某个地图/游戏模式购买武器
; 记住，有些武器是队伍专属的，另一方不能购买
; -1 = 禁止任何队伍购买
; 0 = 仅限匪徒
; 1 = 仅限警察
; 2 = 两个队伍都可以购买
; CS 和 DE 地图的标准武器表格
;
MapStandard = -1,0,-1,2,-1,0,1,2,2,2,-1,2,-1,-1,0,0,1,0,1,1,2,2,0,1,2,1
MapAS = -1,-1,-1,2,-1,0,1,1,1,1,1,1,0,2,0,-1,1,0,1,1,0,0,-1,1,1,1

;
; 手雷购买百分比
; 高爆手雷 (HE)，闪光弹 (FL)，烟雾弹 (SMOKE)
;
GrenadePercent = 98,75,60

;
; 机器人经济设置.从左到右.
;
; 1 - 如果机器人的经济超过设定值，则以购买主武器.
; 2 - 如果机器人的经济超过设定值，则不会购买冲锋枪（MP5、MAC10、TMP、P90、UMP45、SCOUT）（仅适用于警察） (+ 8/9/10)
; 3 - 如果机器人的经济超过设定值，则不会购买冲锋枪（MP5、MAC10、TMP、P90、UMP45、SCOUT）（仅适用于匪徒） (+ 8/9/10)
; 4 - 如果机器人的经济超过设定值，则可以购买霰弹枪（M3、XM1014）.
; 5 - 如果机器人的经济低于设定值，则不能购买霰弹枪 (M3, XM1014).
; 6 - 如果机器人的经济超过设定值，则可以购买AWM, SG550, G3SG1, M249.
; 7 - 如果机器人的经济低于设定值，则不能购买AWM, SG550, G3SG1, M249.
; 8 - 在购买主武器时，机器人还需保留多少经济（仅适用于正常行为类型机器人 - PersonalityNormal）
; 9 - 在购买主武器时，机器人还需保留多少经济（仅适用于激进行为类型机器人 - PersonalityRusher）.
; 10 - 在购买主武器时，机器人还需保留多少经济（仅适用于谨慎行为类型机器人 - PersonalityCareful）.
; 11 - 如果机器人的经济超过设定值，则可以购买护盾.
;
Economics = 1550,2100,2100,4000,6000,7000,16000,1200,800,1100,3000

;
; 以下设置存储了机器人的武器优先级.
; 机器人行为类型 (影响购买和从地面捡起更好的武器).
;
PersonalityNormal = 00,02,01,04,05,06,03,12,10,24,25,13,11,08,07,22,23,20,21,09,19,15,17,18,14,16
PersonalityRusher = 00,02,04,05,01,06,03,24,25,22,23,20,10,12,13,07,08,21,11,09,15,19,17,18,16,14
PersonalityCareful = 00,02,01,04,05,06,03,07,08,12,10,13,11,09,18,17,15,19,16,14,20,22,25,23,24,21 

//
// @文件包: YaPB
// @开发团队: YaPB Project
// 汉化：毛毛的老公
// @文件名: yapb.cfg
// 
// YaPB 主配置文件.可以通过"exec"命令执行.
//
//
//////////// 地图分析与路径相关参数 ////////////
// 当其他所有情况都失败时，是否自动启动分析器.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_graph_analyze_auto_start "1"

//
// 是否自动将分析结果保存到图表文件并重新添加机器人.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_graph_analyze_auto_save "1"

//
// 每个路点之间的最小距离.
// ---
// 默认值: "64", 最小值: "42", 最大值: "128"
// 
yb_graph_analyze_distance "64"

//
// 最大跳跃高度,用于测试下一路点是否可达.
// ---
// 默认值: "44", 最小值: "44", 最大值: "64"
// 
yb_graph_analyze_max_jump_height "44"

//
// 分析器运行时的FPS，防止分析过程中游戏卡顿。
// ---
// 默认值: "30.0", 最小值: "25.0", 最大值: "99.0"
// 
yb_graph_analyze_fps "30.0"

//
// 分析器在完成后是否清理不必要的路径.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_graph_analyze_clean_paths_on_finish "1"

//
// 分析器完成后是否将一些位置接近且连接较多的节点合并.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_graph_analyze_optimize_nodes_on_finish "1"

//
// 分析器完成后是否自动将节点标记为地图目标点.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_graph_analyze_mark_goals_on_finish "1"

//////////// 机器人行为与功能参数 ////////////
//
// 启用或禁用关于机器人状态的调试信息.对最终用户非必需.
// ---
// 默认值: "0", 最小值: "0", 最大值: "4"
// 
yb_debug "0"

//
// 强制所有存活的机器人规划路径并前往此处指定的路径节点.
// ---
// 默认值: "-1", 最小值: "-1", 最大值: "4096"
// 
yb_debug_goal "-1"

//
// 指定每轮开始时可以跟随人类玩家的机器人百分比.
// ---
// 默认值: "20", 最小值: "0", 最大值: "100"
// 
yb_user_follow_percent "20"

//
// 指定单个人类玩家最多可被多少个机器人跟随.
// ---
// 默认值: "1", 最小值: "0", 最大值: "8"
// 
yb_user_max_followers "1"

//
// 启用后，所有机器人将只能使用刀具，跳过购买武器的流程.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
// 
yb_jasonmode "0"

//
// 允许机器人使用无线电或聊天功能.
// 可选值: '0', '1', '2'.
// 若为'0'，无线电和聊天均禁用.
// 若为'1'，仅允许使用无线电.
// 若为'2'，无线电和聊天均允许.
// ---
// 默认值: "2", 最小值: "0", 最大值: "2"
// 
yb_radio_mode "2"

//
// 指定机器人是否能够使用团队经济策略，比如全队不购买武器以存钱购买更好的枪械.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_economics_rounds "1"

//
// 允许机器人无视经济策略，不受经济限制购买武器的百分率.
// ---
// 默认值: "25", 最小值: "0", 最大值: "100"
// 
yb_economics_disrespect_percent "25"

//
// 允许或禁止机器人检测环境亮度，从而决定是否使用手电筒或夜视仪.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_check_darkness "1"

//
// 允许机器人部分躲避手雷.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_avoid_grenades "1"

//
// 允许或禁止机器人向伤害队友的玩家实施报复.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_tkpunish "1"

//
// 启用后，机器人的思考功能将被禁用，机器人会停留在出生点不动.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
// 
yb_freeze_bots "0"

//
// 是否允许机器人喷图.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_spraypaints "1"

//
// 是否允许机器人购买武器.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_botbuy "1"

//
// 允许机器人无需接触即可摧毁周围的可破坏物体.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_destroy_breakables_around "1"

//
// 机器人搜索新的物体、道具和武器的搜索半径范围.
// ---
// 默认值: "450.0", 最小值: "64.0", 最大值: "1024.0"
// 
yb_object_pickup_radius "450.0"

//
// 机器人无需接触即可摧毁周围可破坏物体的范围半径.
// ---
// 默认值: "400.0", 最小值: "64.0", 最大值: "1024.0"
// 
yb_object_destroy_radius "400.0"

//
// 指定机器人聊天音效文件的路径。
// ---
// 默认值: "sound/radio/bot"
// 
yb_chatter_path "sound/radio/bot"

//
// 允许或禁止机器人攻击怪物.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
// 
yb_attack_monsters "0"

//
// 允许或禁止机器人拾取自定义道具.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
// 
yb_pickup_custom_items "0"

//
// 允许机器人拾取模组道具，如弹药、医疗包和护甲.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
// 
yb_pickup_ammo_and_kits "0"

//
// 允许或禁止机器人拾取最优武器.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_pickup_best "1"

//
// 允许或禁止机器人执行地图目标任务，如安放/拆除炸弹、解救人质.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
//  
yb_ignore_objectives "0"

//
// 启用或禁用机器人聊天功能.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_chat "1"

//
// 机器人被击杀后发送随机死亡聊天的概率.
// ---
// 默认值: "30", 最小值: "0", 最大值: "100"
// 
yb_chat_percent "30"

//
// 指定机器人是否能够向墙后的敌人开火（如果听到或怀疑敌人位置）.
// ---
// 默认值: "2", 最小值: "0", 最大值: "3"
// 
yb_shoots_thru_walls "2"

//
// 启用或禁用机器人搜索敌人的功能.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
// 
yb_ignore_enemies "0"

//
// 启用或禁用机器人检测敌人渲染状态的功能，部分模组中会用到.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
// 
yb_check_enemy_rendering "0"

//
// 启用或禁用机器人检测敌人无敌状态的功能，部分模组中会用到.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
// 
yb_check_enemy_invincibility "0"

//
// 启用或禁用机器人在状态良好时用刀刺杀近距离敌人的功能.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_stab_close_enemies "1"

//
// 是否使用引擎检测敌人的潜在可见性.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
// 
yb_use_engine_pvs_check "0"

//
// 使用基于碰撞盒的敌人瞄准方式，替代基于偏移量的方式。需配合yb_use_engine_pvs_check启用以降低CPU占用.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
// 
yb_use_hitbox_enemy_targeting "0"

//
// 机器人射击敌人时是否会考虑玻璃遮挡，仅适用于特殊地图.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
// 
yb_aim_trace_consider_glass "0"

//
// 绑定打开机器人菜单的快捷键.
// ---
// 默认值: "="
// 
yb_bind_menu_key "="

//
// 指定地图切换时不会被配置覆盖的机器人控制台变量列表（用","分隔）.
// ---
// 默认值: "yb_quota,yb_autovacate"
// 
yb_ignore_cvars_on_changelevel "yb_quota,yb_autovacate"

//
// 用于访问机器人命令和菜单的 setinfo 密码，用户设置正确密码后可获得权限.
// ---
// 默认值: ""
// 
yb_password ""

//
// 存储机器人命令和菜单密码的setinfo键名.
// ---
// 默认值: "_ybpw"
// 
yb_password_key "_ybpw"

//
// 启用后，在菜单中执行结束回合命令时，会使用经典的机器人击杀方式，而非游戏引擎的结束回合功能.
// ---
// 默认值: "0"
// 
yb_bots_kill_on_endround "0"

//
// 启用或禁用机器人的CSDM/FFA模式.
// CSDM - 死亡模式：死后即重生，但不会将队友视为敌人
// FFA  - 死斗模式：死后即重生，并将队友也视为敌人
// 可选值: '0', '1', '2', '3'.
// 若为'0'，自动检测CSDM/FFA模式.
// 若为'1'，启用CSDM模式，禁用FFA模式.
// 若为'2'，同时启用CSDM和FFA模式.
// 若为'3'，同时禁用CSDM和FFA模式.
// ---
// 默认值: "0", 最小值: "0", 最大值: "3"
// 
yb_csdm_mode "0"

//
// 启用后，机器人不会根据地图名称前缀（如fy_和ka_）应用对应的游戏模式.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
// 
yb_ignore_map_prefix_game_mode "0"

//
// 机器人处理部分任务时运行的最大线程数，-1表示使用一半的CPU核心.
// ---
// 默认值: "-1", 最小值: "-1", 最大值: "16"
// 
yb_threadpool_workers "-1"

//
// 启用后，机器人投掷手雷时不会受投掷条件限制.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
// 
yb_grenadier_mode "0"

//
// 设置新回合开始后机器人忽略敌人的时长（秒），适用于僵尸模组.
// ---
// 默认值: "0"
// 
yb_ignore_enemies_after_spawn_time "0"

//
// 指定机器人会考虑摧毁的可破坏物体的最大生命值.
// ---
// 默认值: "500.0", 最小值: "1.0", 最大值: "3000.0"
// 
yb_breakable_health_limit "500.0"

//
// 机器人在计分板显示的基础延迟下限。
// ---
// 默认值: "5", 最小值: "0", 最大值: "100"
// 
yb_ping_base_min "5"

//
// 机器人在计分板显示的基础延迟上限。
// ---
// 默认值: "20", 最小值: "0", 最大值: "100"
// 
yb_ping_base_max "20"

//
// 计算机器人平均延迟时是否计入玩家延迟；若禁用，则为机器人随机分配延迟.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
/
yb_ping_count_real_players "1"

//
// 计分板中机器人延迟的更新间隔.
// ---
// 默认值: "1.2", 最小值: "0.1", 最大值: "10.0"
// 
yb_ping_updater_interval "1.2"

//
// 指定加载旧PWF格式路径图时，机器人是否不修正蹲点路径的方向.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
//  
yb_graph_fixcamp "0"

//
// 指定机器人在本地路径图缺失时下载路径图的URL，无需下载则留空.
// ---
// 默认值: "yapb.jeefo.net"
// 
yb_graph_url "yapb.jeefo.net"

//
// 指定机器人尝试将路径图文件上传到数据库的URL.
// ---
// 默认值: "yapb.jeefo.net/upload"
// 
yb_graph_url_upload "yapb.jeefo.net/upload"

//
// 每放置N个路径图节点，自动保存路径图（无需检查）.
// ---
// 默认值: "15", 最小值: "0", 最大值: "4096"
// 
yb_graph_auto_save_count "15"

//
// 编辑器视野中可绘制路径图节点的最大距离.
// ---
// 默认值: "400", 最小值: "64", 最大值: "3072"
// 
yb_graph_draw_distance "400"

//
// 允许机器人自动与路径图数据库同步路径图文件.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_graph_auto_collect_db "1"

//
// 自动踢出机器人，为人类玩家腾出空位.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_autovacate "1"

//
// 自动踢出功能为人类玩家保留的空位数量.
// ---
// 默认值: "1", 最小值: "1", 最大值: "8"
// 
yb_autovacate_keep_slots "1"

//
// 人类玩家加入服务器时立即踢出机器人（需启用yb_autovacate）.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_kick_after_player_connect "1"

//
// 指定添加到游戏中的机器人数量.
// ---
// 默认值: "9", 最小值: "0", 最大值: "32"
// 
yb_quota "9"

//
// 指定机器人数量模式.
// 可选值: 'normal', 'fill', 'match'.
// 若为'fill'，服务器会调整机器人数量，使游戏总玩家数保持为yb_quota的值.
// 若为'match'，服务器会维持人类玩家与机器人数量1:N的比例，N为yb_quota_match的值.
// ---
// 默认值: "normal"
// 
yb_quota_mode "normal"

//
// 当yb_quota_mode设为'match'时，指定与人类玩家匹配的机器人数量比例.
// ---
// 默认值: "0", 最小值: "0", 最大值: "32"
// 
yb_quota_match "0"

//
// 指定机器人代码每秒运行的次数.
// ---
// 默认值: "30.0", 最小值: "24.0", 最大值: "90.0"
// 
yb_think_fps "30.0"

//
// 指定人类玩家全部阵亡后，机器人将被击杀的延迟时间（秒）.
// ---
// 默认值: "0.0", 最小值: "0.0", 最大值: "90.0"
// 
yb_autokill_delay "0.0"

//
// 若第一个人类玩家加入机器人游戏，是否重启游戏.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
// 
yb_first_human_restart "0"

//
// 指定机器人是否仅在至少有一个人类玩家在游戏中时才加入服务器.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
// 
yb_join_after_player "0"

//
// 强制所有机器人加入此处指定的队伍.
// ---
// 默认值: "any"
// 
yb_join_team "any"

//
// 指定地图切换后机器人开始加入游戏的延迟时间（秒）.
// ---
// 默认值: "5.0", 最小值: "0.0", 最大值: "30.0"
// 
yb_join_delay "5.0"

//
// 所有机器人名称将以此处指定的字符串为队标.
// ---
// 默认值: ""
// 
yb_name_prefix ""

//////////// 难度与个性化参数 //////////// 
//
// 所有机器人的难度等级，运行时修改会影响已创建的机器人.
// ---
// 默认值: "3", 最小值: "0", 最大值: "4"
// 
yb_difficulty "3"

//
// 机器人创建时随机难度的下限，仅影响新创建的机器人；-1表示仅使用yb_difficulty的设置.
// ---
// 默认值: "-1", 最小值: "-1", 最大值: "4"
//  
yb_difficulty_min "-1"

//
// 机器人创建时随机难度的上限，仅影响新创建的机器人；-1表示仅使用yb_difficulty的设置.
// ---
// 默认值: "-1", 最小值: "-1", 最大值: "4"
// 
yb_difficulty_max "-1"

//
// 是否允许每个机器人根据队伍的KD比自动调整自身难度.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
// 
yb_difficulty_auto "0"

//
// 机器人自动调整难度的间隔时间.
// ---
// 默认值: "30", 最小值: "30", 最大值: "240"
// 
yb_difficulty_auto_balance_interval "30"

//
// 启用或禁用在计分板中机器人名称前显示头像，目前仅能看到Steam好友的头像.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
// 
yb_show_avatars "0"

//
// 启用计分板中的延迟显示.
// 可选值: '0', '1', '2'
// 若为'0'，不显示任何内容
// 若为'1'，显示'BOT'标识
// 若为'2'，显示模拟延迟
// ---
// 默认值: "0", 最小值: "0", 最大值: "2"
// 
yb_show_latency "2"

//
// 允许在地图切换时保存机器人名称，换图后机器人名称保持不变.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_save_bots_names "1"

//
// 指定恐怖分子队伍中机器人使用的皮肤.
// ---
// 默认值: "0", 最小值: "0", 最大值: "5"
// 
yb_botskin_t "0"

//
// 指定反恐精英队伍中机器人使用的皮肤.
// ---
// 默认值: "0", 最小值: "0", 最大值: "5"
// 
yb_botskin_ct "0"

//
// 指定通过数量管理创建机器人时的默认性格
// 可选值: 'none', 'normal', 'careful', 'rusher'
// 'none' - 随机选择性格
// 'normal' - 常规 
// 'careful' -  谨慎
// 'rusher' - 激进
// ---
// 默认值: "none"
// 
yb_preferred_personality "none"

//
// 机器人加入游戏的间隔时间.
// ---
// 默认值: "0.1", 最小值: "0.1", 最大值: "1.0"
// 
yb_quota_adding_interval "0.1"

//
// 检查机器人总数量的间隔时间.
// ---
// 默认值: "0.4", 最小值: "0.4", 最大值: "2.0"
//  
yb_quota_maintain_interval "0.4"

//
// 指定机器人消息和菜单的语言.
// ---
// 默认值: "en"
// 
yb_language "en"

//
// 随机让机器人断开并重新连接，模拟玩家进出服务器的情况.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
// 
yb_rotate_bots "0"

//
// 启用机器人轮换后，机器人保持连接的最短时间（秒）.
// ---
// 默认值: "360.0", 最小值: "120.0", 最大值: "7200.0"
// 
yb_rotate_stay_min "360.0"

//
// 启用机器人轮换后，机器人保持连接的最长时间（秒）.
// ---
// 默认值: "3600.0", 最小值: "1800.0", 最大值: "14400.0"
// 
yb_rotate_stay_max "3600.0"

//
//
// 指定禁止机器人购买/拾取的武器列表（用分号分隔）.
// 《反恐精英1.6》的武器列表：
// p228 - SIG P228手枪
// shield - 战术盾牌
// scout - 斯太尔侦察步枪
// hegren - 高爆手雷
// xm1014 - 贝内利XM1014霰弹枪
// mac10 - 英格拉姆MAC-10冲锋枪
// aug - 斯太尔AUG突击步枪
// sgren - 烟雾弹
// elite - 双持贝瑞塔96G精英手枪
// fn57 - FN Five-Seven手枪
// ump45 - HK UMP45冲锋枪
// sg550 - SIG SG-550狙击步枪
// galil - IMI加利尔突击步枪
// famas - GIAT FAMAS突击步枪
// usp - HK USP .45战术手枪
// glock - 格洛克18全自动手枪
// awp - AI Arctic Warfare/Magnum狙击步枪
// mp5 - HK MP5海军版冲锋枪
// m249 - FN M249轻机枪
// m3 - 贝内利M3 Super90霰弹枪
// m4a1 - 柯尔特M4A1卡宾枪
// tmp - 斯太尔战术冲锋枪
// g3sg1 - HK G3/SG-1狙击步枪
// flash - 闪光弹
// deagle - 沙漠之鹰.50AE手枪
// sg552 - SIG SG-552突击步枪
// ak47 - AK-47突击步枪
// knife - 刀具
// p90 - FN P90冲锋枪
// vest - 防弹衣
// vesthelm - 防弹衣+头盔
// defuser - 拆弹器
//  
// ---
// 默认值: ""
// 
yb_restricted_weapons ""

//
// 启用后，机器人在移动时不会尝试躲避队友，适用于安装了半穿模插件的服务器.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
// 
yb_has_team_semiclip "0"

//
// 生成路径图时，判断当前节点与下一个节点之间的连接是否为跳跃连接的最大坡度高度变化值.
// ---
// 默认值: "24.0", 最小值: "12.0", 最大值: "48.0"
// 
yb_graph_slope_height "24.0"

//
// 选择启发式函数模式，仅用于调试.
// ---
// 默认值: "0", 最小值: "0", 最大值: "4"
// 
yb_path_heuristic_mode "0"

//
// 限制Floyd-Warshall算法的最大内存占用（兆字节），超出则使用Dijkstra算法.
// ---
// 默认值: "6", 最小值: "0", 最大值: "32"
// 
yb_path_floyd_memory_limit "6"

//
// 使用简单的距离路径计算替代完整的Dijkstra路径循环，仅在因内存限制无法使用Floyd矩阵时生效.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_path_dijkstra_simple_distance "1"

//
// 为A*路径算法启用后处理平滑，减少路径的锯齿状，会占用一定CPU资源.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
// 
yb_path_astar_post_smooth "0"

//
// 每轮开始时随机化路径规划.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_path_randomize_on_round_start "1"

//
// 启用或禁用在游戏开始时向主机显示欢迎信息.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_display_welcome_text "1"

//
// 启用或禁用模拟服务器查询响应，使机器人在服务器浏览器中显示为真实玩家.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
//  
yb_enable_query_hook "0"

//
// 允许或禁止机器人返回模拟的Steam ID.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
// 
yb_enable_fake_steamids "0"

//
// 烟雾弹对机器人视野的影响程度.
// ---
// 默认值: "2", 最小值: "0", 最大值: "2"
// 
yb_smoke_grenade_checks "2"

//
// 检测已爆炸烟雾弹周围烟雾范围的半径.
// ---
// 默认值: "240", 最小值: "32", 最大值: "320"
// 
yb_smoke_grenade_radius "240"

//
// 指定机器人在认为附近有敌人时是否能够使用静步（shift）.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_walking_allowed "1"

//
// 允许或禁止机器人蹲点，不影响炸弹/人质防守任务.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_camping_allowed "1"

//
// 机器人蹲点时长计算的下限.
// ---
// 默认值: "15.0", 最小值: "5.0", 最大值: "90.0"
// 
yb_camping_time_min "15.0"

//
// 机器人蹲点时长计算的上限.
// ---
// 默认值: "45.0", 最小值: "15.0", 最大值: "120.0"
// 
yb_camping_time_max "45.0"

//
// 允许或禁止机器人在冲锋且附近无敌人时随机出刀.
// ---
// 默认值: "1", 最小值: "0", 最大值: "1"
// 
yb_random_knife_attacks "1"

//
// 预测敌人位置时的最大路径节点数量.
// ---
// 默认值: "22", 最小值: "15", 最大值: "256"
//  
yb_max_nodes_for_predict "22"

//
// 启用或禁用机器人的超强难度模式.
// ---
// 默认值: "0", 最小值: "0", 最大值: "1"
// 
yb_whose_your_daddy "0"

